<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --card: #1a1e28;
    --border: #252a38;
    --accent: #e8a020;
    --accent2: #3b8beb;
    --text: #e8eaf0;
    --muted: #6b7280;
    --trap: #e8a020;
    --sporting: #3b8beb;
    --super: #a855f7;
    --skeet: #2ec97e;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #0a0c10; }
  body { background: #0a0c10 !important; color: #e8eaf0 !important; font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif; min-height: 100vh; -webkit-text-size-adjust: 100%; }
  @media (prefers-color-scheme: light) {
  html, body { background: #0a0c10 !important; color: #e8eaf0 !important; }
  }

/* ── HEADER ── */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 12px 16px;
position: sticky;
top: 0;
z-index: 100;
}

.header-row1 {
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
}

.logo { font-family: ‘Bebas Neue’, ‘Arial Black’, sans-serif; font-size: 26px; letter-spacing: 2px; color: var(–accent); line-height: 1; }
.logo span { color: var(–text); }
.logo-sub { font-size: 9px; color: var(–muted); letter-spacing: 1px; margin-top: 1px; }

.header-meta { font-size: 11px; color: var(–muted); line-height: 1.5; text-align: center; flex: 1; }

.tabs {
display: flex;
gap: 3px;
background: var(–bg);
border-radius: 8px;
padding: 3px;
flex-shrink: 0;
}
.tab {
padding: 5px 10px;
border-radius: 5px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
}
.tab.active { background: var(–card); color: var(–text); }

/* ── FILTERS ── */
.filters {
padding: 10px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex;
flex-direction: column;
gap: 8px;
}

.filter-row {
display: flex;
align-items: center;
gap: 8px;
flex-wrap: wrap;
padding-bottom: 2px;
}
.disc-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
flex: 1;
}

.filter-label {
font-size: 10px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
color: var(–muted);
flex-shrink: 0;
width: 70px;
}

.pill {
padding: 4px 12px;
border-radius: 20px;
border: 1px solid #252a38 !important;
background: #12151c !important;
color: #6b7280 !important;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}
.pill:active { opacity: 0.7; }
.pill.active            { background: #e8a020 !important; border-color: #e8a020 !important; color: #000 !important; font-weight: 600; }
.pill.trap-pill.active  { background: #e8a020 !important; border-color: #e8a020 !important; color: #000 !important; }
.pill.sport-pill.active { background: #3b8beb !important; border-color: #3b8beb !important; color: #fff !important; }
.pill.super-pill.active { background: #a855f7 !important; border-color: #a855f7 !important; color: #fff !important; }
.pill.skeet-pill.active { background: #2ec97e !important; border-color: #2ec97e !important; color: #000 !important; }

.search-row {
position: relative;
}
.search-row input {
width: 100%;
background: var(–card);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
padding: 8px 14px 8px 36px;
outline: none;
-webkit-appearance: none;
}
.search-row input:focus { border-color: var(–accent2); }
.search-row input::placeholder { color: var(–muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(–muted); font-size: 15px; pointer-events: none; }

/* ── MAIN ── */
main { padding: 16px; }

/* ── DAY SECTION ── */
.day-section { margin-bottom: 28px; }

.day-header {
display: flex;
align-items: baseline;
gap: 8px;
margin-bottom: 12px;
padding-bottom: 8px;
border-bottom: 1px solid var(–border);
}

.day-label { font-size: 18px; font-weight: 600; color: #4a5060; }
.day-date  { font-size: 13px; font-weight: 600; color: #4a5060; }
.event-count { font-size: 11px; color: var(–muted); margin-left: auto; }

/* ── TIME BLOCK ── */
.time-block { margin-bottom: 16px; }

.time-header {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 8px;
}

.time-main { font-size: 15px; font-weight: 700; color: #4a5060; }
.time-sub  { font-size: 11px; font-weight: 500; color: #4a5060; }

/* ── SQUAD CARDS — full width on mobile ── */
.squad-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 14px;
border-top: 3px solid var(–muted);
margin-bottom: 8px;
transition: box-shadow .15s;
}
.squad-card.discipline-Trap     { border-top-color: var(–trap); }
.squad-card.discipline-Sporting { border-top-color: var(–sporting); }
.squad-card.discipline-Super    { border-top-color: var(–super); }
.squad-card.discipline-Skeet    { border-top-color: var(–skeet); }
.squad-card.highlight           { box-shadow: 0 0 0 2px var(–accent2); }

.squad-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
.squad-name   { font-size: 12px; font-weight: 600; color: var(–text); line-height: 1.3; margin-top: 4px; }
.squad-num    { font-family: ‘Bebas Neue’, sans-serif; font-size: 22px; color: var(–muted); line-height: 1; flex-shrink: 0; }
.squad-meta   { font-size: 11px; color: var(–muted); margin-bottom: 8px; }

.discipline-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.tag-Trap     { background: rgba(232,160,32,.15); color: var(–trap); }
.tag-Sporting { background: rgba(59,139,235,.15);  color: var(–sporting); }
.tag-Super    { background: rgba(168,85,247,.15);  color: var(–super); }
.tag-Skeet    { background: rgba(46,201,126,.15);  color: var(–skeet); }

.athlete-list { list-style: none; }
.athlete-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid var(–border); font-size: 13px; }
.athlete-item:first-child { border-top: none; }
.athlete-num   { font-size: 10px; color: var(–muted); width: 14px; flex-shrink: 0; }
.athlete-name  { flex: 1; color: var(–muted); font-weight: 300; }
.athlete-name.eagle       { color: var(–text); font-weight: 600; }
.athlete-name.highlighted { color: var(–accent2); font-weight: 600; }
.athlete-name.open        { color: var(–muted); font-style: italic; }
.athlete-level { font-size: 10px; color: var(–muted); flex-shrink: 0; }

/* ── ATHLETE VIEW ── */
.athlete-profile { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.athlete-profile:active { border-color: var(–accent2); }
.athlete-profile-name  { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.athlete-profile-level { font-size: 11px; color: var(–muted); margin-bottom: 10px; }
.athlete-events { display: flex; flex-direction: column; gap: 5px; }
.athlete-event-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(–surface); border-radius: 6px; border: 1px solid var(–border); }
.ae-discipline { width: 76px; flex-shrink: 0; }
.ae-info { flex: 1; color: var(–muted); font-size: 12px; }
.ae-time { font-weight: 600; color: var(–text); font-size: 12px; flex-shrink: 0; }

.view { display: none; }
.view.active { display: block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
</style>

</head>

    athletes:[{name:"Lukas Dittrich",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Lucas Wilton",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Kenny Mixon",team:"Allen Eagles",level:"Senior/Varsity"}]},

    athletes:[{name:"Matthew Raff",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Vincent Calovich",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Dennis Osborne",team:"Allen Eagles",level:"Senior/Varsity"}]},

    athletes:[{name:"Oliver Levy",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Colin Parks",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Noah Vaughn Bjerke",team:"Allen Eagles",level:"Senior/Varsity"}]},

    athletes:[{name:"Carly Drake",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Ella Calvert",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Emerson Gallagher",team:"Allen Eagles",level:"Senior/Varsity"}]},
  { id:37, disc:"Skeet",    date:"04/18", flight:5,  time:"1:00 PM", loc:"Location 4", num:120, team:"Allen Eagles Skeet 9",
    athletes:[{name:"Maggie Boren",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Rishayna Sachdev",team:"Allen Eagles",level:"Intermediate/Entry Level"},{name:"Open",team:"",level:""}]},

    athletes:[{name:"Kyle Erickson",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Edmund Joan Murillo",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Open",team:"",level:""}]},
  { id:39, disc:"Skeet",    date:"04/18", flight:7,  time:"3:00 PM", loc:"Location 4", num:136, team:"Allen Eagles Skeet 11",
    athletes:[{name:"Benjamin Assa",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Lukas Terrell",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Mackenzie Terrell",team:"Allen Eagles",level:"Intermediate/Entry Level"}]},
];

let activeView   = 'timeline';
let filterDayVal = 'all';
let filterDiscs  = new Set(['Trap','Sporting','Super','Skeet']);
let searchVal    = '';

const discNames = {Trap:'Trap', Sporting:'Sporting Clays', Super:'Super Sporting', Skeet:'Skeet'};
const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dayNames   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function timeToMinutes(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const pm = m[3].toUpperCase() === 'PM';
  if (pm && h !== 12) h += 12;
  if (!pm && h === 12) h = 0;
  return h * 60 + min;
}

function levelShort(l) {
  if (!l) return '';
  if (l.includes('Senior/Varsity') && !l.includes('Jr')) return 'Sr/V';
  if (l.includes('Jr. Varsity')) return 'Jr/V';
  if (l.includes('Entry')) return 'Entry';
  if (l.includes('Advanced')) return 'Adv';
  return l.substring(0,5);
}

function filteredSquads() {
  return squads.filter(s => {
    const dayOk   = filterDayVal === 'all' || s.date === filterDayVal;
    const discOk  = filterDiscs.has(s.disc);
    const searchOk = !searchVal ||
      s.athletes.some(a => a.name.toLowerCase().includes(searchVal.toLowerCase())) ||
      s.team.toLowerCase().includes(searchVal.toLowerCase());
    return dayOk && discOk && searchOk;
  });
}

function renderTimeline() {
  const data = filteredSquads();
  const el = document.getElementById('view-timeline');
  if (!data.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>No squads match your filters.</p></div>`;
    return;
  }

  const sorted = [...data].sort((a,b) =>
    a.date !== b.date ? a.date.localeCompare(b.date) : timeToMinutes(a.time) - timeToMinutes(b.time)
  );

  // Group by date → time
  const byDate = {};
  sorted.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = {};
    if (!byDate[s.date][s.time]) byDate[s.date][s.time] = [];
    byDate[s.date][s.time].push(s);
  });

  let html = '';
  let dayIdx = 0;

  Object.keys(byDate).sort().forEach(date => {
    dayIdx++;
    const [m, d] = date.split('/');
    const jsDay  = new Date(2026, parseInt(m)-1, parseInt(d)).getDay();
    const total  = Object.values(byDate[date]).reduce((n,a) => n+a.length, 0);

    html += `<div class="day-section">
      <div class="day-header">
        <span class="day-label">Day ${dayIdx} — ${dayNames[jsDay]}</span>
        <span class="day-date">${monthNames[parseInt(m)]} ${parseInt(d)}</span>
        <span class="event-count">${total} squads</span>
      </div>`;

    const times = Object.keys(byDate[date]).sort((a,b) => timeToMinutes(a)-timeToMinutes(b));
    times.forEach(time => {
      const tSquads = byDate[date][time];
      html += `<div class="time-block">
        <div class="time-header">
          <span class="time-main">${time}</span>
          <span class="time-sub">Flight ${tSquads[0].flight}</span>
        </div>`;

      tSquads.forEach(sq => {
        const isHL = searchVal && sq.athletes.some(a => a.name.toLowerCase().includes(searchVal.toLowerCase()));
        html += `<div class="squad-card discipline-${sq.disc}${isHL?' highlight':''}">
          <div class="squad-header">
            <div>
              <span class="discipline-tag tag-${sq.disc}">${discNames[sq.disc]}</span>
              <div class="squad-name">${sq.team}</div>
            </div>
            <div class="squad-num">#${sq.num}</div>
          </div>
          <div class="squad-meta">📍 ${sq.loc}</div>
          <ul class="athlete-list">`;

        sq.athletes.forEach((a,i) => {
          const isOpen  = a.name === 'Open';
          const isEagle = !isOpen && (a.team||'').toLowerCase().includes('allen');
          const isMatch = !isOpen && searchVal && a.name.toLowerCase().includes(searchVal.toLowerCase());
          html += `<li class="athlete-item">
            <span class="athlete-num">${i+1}</span>
            <span class="athlete-name${isOpen?' open':''}${isEagle&&!isMatch?' eagle':''}${isMatch?' highlighted':''}">${a.name}</span>
            <span class="athlete-level">${isOpen?'':levelShort(a.level)}</span>
          </li>`;
        });

        html += `</ul></div>`;
      });

      html += `</div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

function renderAthletes() {
  const athleteMap = {};
  squads.forEach(sq => {
    sq.athletes.forEach(a => {
      if (a.name === 'Open') return;
      if (!athleteMap[a.name]) athleteMap[a.name] = {name:a.name, level:a.level, events:[]};
      athleteMap[a.name].events.push({disc:sq.disc, date:sq.date, time:sq.time, loc:sq.loc, flight:sq.flight});
    });
  });

  const athletes = Object.values(athleteMap).sort((a,b) =>
    a.name.split(' ').pop().localeCompare(b.name.split(' ').pop())
  );

  const filter   = searchVal.toLowerCase();
  const filtered = filter ? athletes.filter(a => a.name.toLowerCase().includes(filter)) : athletes;

  const el = document.getElementById('view-athletes');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>No athletes found.</p></div>`;
    return;
  }

  let html = '';
  filtered.forEach(athlete => {
    const evts = athlete.events
      .filter(e => (filterDayVal==='all'||e.date===filterDayVal) && filterDiscs.has(e.disc))
      .sort((a,b) => a.date!==b.date ? a.date.localeCompare(b.date) : timeToMinutes(a.time)-timeToMinutes(b.time));
    if (!evts.length) return;

    html += `<div class="athlete-profile">
      <div class="athlete-profile-name">${athlete.name}</div>
      <div class="athlete-profile-level">${athlete.level}</div>
      <div class="athlete-events">`;

    evts.forEach(e => {
      const [m,d] = e.date.split('/');
      html += `<div class="athlete-event-row">
        <div class="ae-discipline"><span class="discipline-tag tag-${e.disc}">${discNames[e.disc]}</span></div>
        <div class="ae-info">${monthNames[parseInt(m)]} ${parseInt(d)} · ${e.loc}</div>
        <div class="ae-time">${e.time}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

function render() {
  if (activeView === 'timeline') renderTimeline();
  else renderAthletes();
}

function switchView(e, view) {
  activeView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  render();
}

function filterDay(el, val) {
  filterDayVal = val;
  document.querySelectorAll('.filter-row:first-child .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterDisc(el, disc) {
  if (filterDiscs.has(disc)) {
    if (filterDiscs.size > 1) filterDiscs.delete(disc);
  } else {
    filterDiscs.add(disc);
  }
  el.classList.toggle('active', filterDiscs.has(disc));
  render();
}

function doSearch(val) {
  searchVal = val;
  render();
}

render();
</script>
