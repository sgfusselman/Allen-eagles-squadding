<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --card: #1a1e28;
    --border: #252a38;
    --accent: #e8a020;
    --accent2: #3b8beb;
    --accent3: #2ec97e;
    --text: #e8eaf0;
    --muted: #6b7280;
    --trap: #e8a020;
    --sporting: #3b8beb;
    --super: #a855f7;
    --skeet: #2ec97e;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
}

header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 20px 28px;
display: flex;
align-items: center;
gap: 16px;
position: sticky;
top: 0;
z-index: 100;
}

.logo { font-family: ‘Bebas Neue’, sans-serif; font-size: 28px; letter-spacing: 2px; color: var(–accent); line-height: 1; }
.logo span { color: var(–text); }
.header-meta { font-size: 12px; color: var(–muted); border-left: 1px solid var(–border); padding-left: 16px; line-height: 1.6; }

.tabs {
display: flex;
gap: 4px;
margin-left: auto;
background: var(–bg);
border-radius: 8px;
padding: 4px;
}
.tab {
padding: 6px 14px;
border-radius: 6px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all .15s;
}
.tab.active { background: var(–card); color: var(–text); }
.tab:hover:not(.active) { color: var(–text); }

main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

.filters {
display: flex;
gap: 10px;
flex-wrap: wrap;
margin-bottom: 24px;
align-items: center;
}
.filter-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(–muted); margin-right: 4px; }

.pill {
padding: 5px 14px;
border-radius: 20px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–muted);
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
}
.pill:hover { border-color: var(–accent); color: var(–text); }
.pill.active { background: var(–accent); border-color: var(–accent); color: #000; font-weight: 600; }
.pill.trap-pill.active    { background: var(–trap);     border-color: var(–trap); color: #000; }
.pill.sporting-pill.active{ background: var(–sporting); border-color: var(–sporting); color: #fff; }
.pill.super-pill.active   { background: var(–super);    border-color: var(–super); color: #fff; }
.pill.skeet-pill.active   { background: var(–skeet);    border-color: var(–skeet); color: #000; }

.search-wrap { margin-left: auto; position: relative; }
.search-wrap input {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
padding: 7px 14px 7px 34px;
width: 220px;
outline: none;
transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(–accent2); }
.search-wrap input::placeholder { color: var(–muted); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(–muted); font-size: 14px; pointer-events: none; }

.day-section { margin-bottom: 32px; }
.day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.day-label { font-family: ‘DM Sans’, sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; color: #4a5060; }
.day-date { font-size: 13px; font-weight: 600; color: #4a5060; background: var(–surface); border: 1px solid var(–border); border-radius: 4px; padding: 3px 8px; }
.event-count { font-size: 11px; color: var(–muted); margin-left: auto; }

.flights-grid { display: flex; flex-direction: column; gap: 6px; }
.flight-row { display: grid; grid-template-columns: 120px 1fr; gap: 12px; align-items: start; }
.flight-time { text-align: right; padding-top: 10px; }
.time-main { font-size: 15px; font-weight: 700; color: #4a5060; }
.time-sub { font-size: 11px; font-weight: 500; color: #4a5060; margin-top: 2px; }
.flight-squads { display: flex; gap: 8px; flex-wrap: wrap; }

.squad-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
min-width: 200px;
max-width: 260px;
flex: 1;
border-top: 3px solid var(–muted);
transition: transform .15s, box-shadow .15s;
cursor: default;
}
.squad-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.squad-card.discipline-Trap     { border-top-color: var(–trap); }
.squad-card.discipline-Sporting { border-top-color: var(–sporting); }
.squad-card.discipline-Super    { border-top-color: var(–super); }
.squad-card.discipline-Skeet    { border-top-color: var(–skeet); }
.squad-card.highlight { box-shadow: 0 0 0 2px var(–accent2); }

.squad-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.squad-name { font-size: 11px; font-weight: 600; color: var(–text); line-height: 1.3; }
.squad-num { font-family: ‘Bebas Neue’, sans-serif; font-size: 20px; color: var(–muted); line-height: 1; flex-shrink: 0; }
.squad-meta { font-size: 10px; color: var(–muted); margin-bottom: 8px; }

.discipline-tag { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.tag-Trap     { background: rgba(232,160,32,.15); color: var(–trap); }
.tag-Sporting { background: rgba(59,139,235,.15);  color: var(–sporting); }
.tag-Super    { background: rgba(168,85,247,.15);  color: var(–super); }
.tag-Skeet    { background: rgba(46,201,126,.15);  color: var(–skeet); }

.athlete-list { list-style: none; }
.athlete-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; border-top: 1px solid var(–border); }
.athlete-item:first-child { border-top: none; }
.athlete-num  { font-size: 9px; color: var(–muted); width: 12px; flex-shrink: 0; }
.athlete-name { flex: 1; color: var(–muted); font-weight: 300; }
.athlete-name.eagle       { color: var(–text); font-weight: 600; }
.athlete-name.highlighted { color: var(–accent2); font-weight: 600; }
.athlete-name.open        { color: var(–muted); font-style: italic; font-weight: 300; }
.athlete-level { font-size: 9px; color: var(–muted); }

/* Athlete view */
.athlete-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.athlete-profile { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 16px; transition: all .15s; }
.athlete-profile:hover { border-color: var(–accent2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.athlete-profile-name  { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.athlete-profile-level { font-size: 11px; color: var(–muted); margin-bottom: 12px; }
.athlete-events { display: flex; flex-direction: column; gap: 6px; }
.athlete-event-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 6px 10px; background: var(–surface); border-radius: 6px; border: 1px solid var(–border); }
.ae-discipline { width: 80px; flex-shrink: 0; }
.ae-info { flex: 1; color: var(–muted); }
.ae-time { font-weight: 500; color: var(–text); font-size: 11px; }

.view { display: none; }
.view.active { display: block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.divider { width: 1px; height: 20px; background: var(–border); margin: 0 4px; align-self: center; }
</style>

</head>

    athletes:[{name:"Matthew Raff",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Vincent Calovich",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Dennis Osborne",team:"Allen Eagles",level:"Senior/Varsity"}]},
  { id:35, disc:"Skeet",    date:"04/18", flight:5,  time:"1:00 PM", loc:"Location 3", num:118, team:"Allen Eagles Skeet 8",
    athletes:[{name:"Oliver Levy",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Colin Parks",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Noah Vaughn Bjerke",team:"Allen Eagles",level:"Senior/Varsity"}]},

    athletes:[{name:"Kyle Erickson",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Edmund Joan Murillo",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Open",team:"",level:""}]},
  { id:39, disc:"Skeet",    date:"04/18", flight:7,  time:"3:00 PM", loc:"Location 4", num:136, team:"Allen Eagles Skeet 11",
    athletes:[{name:"Benjamin Assa",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Lukas Terrell",team:"Allen Eagles",level:"Senior/Varsity"},{name:"Mackenzie Terrell",team:"Allen Eagles",level:"Intermediate/Entry Level"}]},
];

// ── STATE ──
let activeView = 'timeline';
let filterDayVal = 'all';
let filterDiscs = new Set(['Trap','Sporting','Super','Skeet']);
let searchVal = '';

const discNames = {Trap:'Trap', Sporting:'Sporting Clays', Super:'Super Sporting', Skeet:'Skeet'};

// Convert "9:00 AM" / "2:30 PM" to minutes since midnight for sorting
function timeToMinutes(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const pm = m[3].toUpperCase() === 'PM';
  if (pm && h !== 12) h += 12;
  if (!pm && h === 12) h = 0;
  return h * 60 + min;
}

function levelShort(l) {
  if (!l) return '';
  if (l.includes('Senior/Varsity') && !l.includes('Jr')) return 'Sr/V';
  if (l.includes('Jr. Varsity')) return 'Jr/V';
  if (l.includes('Entry')) return 'Entry';
  if (l.includes('Advanced')) return 'Adv';
  return l.substring(0,6);
}

function filteredSquads() {
  return squads.filter(s => {
    const dayOk  = filterDayVal === 'all' || s.date === filterDayVal;
    const discOk = filterDiscs.has(s.disc);
    const searchOk = !searchVal ||
      s.athletes.some(a => a.name.toLowerCase().includes(searchVal.toLowerCase())) ||
      s.team.toLowerCase().includes(searchVal.toLowerCase());
    return dayOk && discOk && searchOk;
  });
}

// ── TIMELINE ──
function renderTimeline() {
  const data = filteredSquads();
  const container = document.getElementById('view-timeline');
  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>No squads match your filters.</p></div>`;
    return;
  }

  // Sort squads by date then time
  const sorted = [...data].sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return timeToMinutes(a.time) - timeToMinutes(b.time);
  });

  // Group by date
  const byDate = {};
  sorted.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = {};
    const tk = s.time;
    if (!byDate[s.date][tk]) byDate[s.date][tk] = [];
    byDate[s.date][tk].push(s);
  });

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let html = '';
  let dayIndex = 0;

  Object.keys(byDate).sort().forEach(date => {
    dayIndex++;
    const [m, d] = date.split('/');
    const jsDate = new Date(2026, parseInt(m) - 1, parseInt(d));
    const dayName = dayNames[jsDate.getDay()];
    const timeGroups = byDate[date];
    const totalSquads = Object.values(timeGroups).reduce((n, arr) => n + arr.length, 0);

    html += `<div class="day-section">
      <div class="day-header">
        <div class="day-label">Day ${dayIndex} — ${dayName}</div>
        <div class="day-date">${monthNames[parseInt(m)]} ${parseInt(d)}, 2026</div>
        <div class="event-count">${totalSquads} squad${totalSquads !== 1 ? 's' : ''}</div>
      </div>
      <div class="flights-grid">`;

    // Times are already sorted because we sorted squads above and preserved insertion order
    const sortedTimes = Object.keys(timeGroups).sort((a,b) => timeToMinutes(a) - timeToMinutes(b));

    sortedTimes.forEach(time => {
      const timeSquads = timeGroups[time];
      // find flight number from first squad at this time
      const flightNum = timeSquads[0].flight;

      html += `<div class="flight-row">
        <div class="flight-time">
          <div class="time-main">${time}</div>
          <div class="time-sub">Flight ${flightNum}</div>
        </div>
        <div class="flight-squads">`;

      timeSquads.forEach(sq => {
        const isHighlight = searchVal && sq.athletes.some(a =>
          a.name.toLowerCase().includes(searchVal.toLowerCase())
        );
        html += `<div class="squad-card discipline-${sq.disc}${isHighlight ? ' highlight' : ''}">
          <div class="squad-header">
            <div>
              <span class="discipline-tag tag-${sq.disc}">${discNames[sq.disc]}</span>
              <div class="squad-name" style="margin-top:5px">${sq.team}</div>
            </div>
            <div class="squad-num">#${sq.num}</div>
          </div>
          <div class="squad-meta">📍 ${sq.loc}</div>
          <ul class="athlete-list">`;

        sq.athletes.forEach((a, i) => {
          const isOpen  = a.name === 'Open';
          const isEagle = !isOpen && (a.team || '').toLowerCase().includes('allen');
          const isMatch = !isOpen && searchVal && a.name.toLowerCase().includes(searchVal.toLowerCase());
          html += `<li class="athlete-item">
            <span class="athlete-num">${i+1}</span>
            <span class="athlete-name${isOpen ? ' open' : ''}${isEagle && !isMatch ? ' eagle' : ''}${isMatch ? ' highlighted' : ''}">${a.name}</span>
            <span class="athlete-level">${isOpen ? '' : levelShort(a.level)}</span>
          </li>`;
        });

        html += `</ul></div>`;
      });

      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

// ── ATHLETE VIEW ──
function renderAthletes() {
  const athleteMap = {};
  squads.forEach(sq => {
    sq.athletes.forEach(a => {
      if (a.name === 'Open') return;
      if (!athleteMap[a.name]) athleteMap[a.name] = {name:a.name, level:a.level, events:[]};
      athleteMap[a.name].events.push({disc:sq.disc, date:sq.date, time:sq.time, loc:sq.loc, flight:sq.flight});
    });
  });

  const athletes = Object.values(athleteMap).sort((a,b) =>
    a.name.split(' ').pop().localeCompare(b.name.split(' ').pop())
  );

  const filter = searchVal.toLowerCase();
  const filtered = filter ? athletes.filter(a => a.name.toLowerCase().includes(filter)) : athletes;

  if (!filtered.length) {
    document.getElementById('view-athletes').innerHTML =
      `<div class="empty-state"><div class="icon">🎯</div><p>No athletes found.</p></div>`;
    return;
  }

  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = `<div class="athlete-grid">`;

  filtered.forEach(athlete => {
    const evts = athlete.events
      .filter(e => (filterDayVal === 'all' || e.date === filterDayVal) && filterDiscs.has(e.disc))
      .sort((a,b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return timeToMinutes(a.time) - timeToMinutes(b.time);
      });

    if (!evts.length) return;

    html += `<div class="athlete-profile">
      <div class="athlete-profile-name">${athlete.name}</div>
      <div class="athlete-profile-level">${athlete.level}</div>
      <div class="athlete-events">`;

    evts.forEach(e => {
      const [m, d] = e.date.split('/');
      html += `<div class="athlete-event-row">
        <div class="ae-discipline"><span class="discipline-tag tag-${e.disc}">${discNames[e.disc]}</span></div>
        <div class="ae-info">${monthNames[parseInt(m)]} ${parseInt(d)} · ${e.loc}</div>
        <div class="ae-time">${e.time}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  document.getElementById('view-athletes').innerHTML = html;
}

// ── CONTROLS ──
function render() {
  if (activeView === 'timeline') renderTimeline();
  else renderAthletes();
}

function switchView(e, view) {
  activeView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  render();
}

function filterDay(el, val) {
  filterDayVal = val;
  document.querySelectorAll('[onclick^="filterDay"]').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterDisc(el, disc) {
  if (filterDiscs.has(disc)) {
    if (filterDiscs.size > 1) filterDiscs.delete(disc);
  } else {
    filterDiscs.add(disc);
  }
  el.classList.toggle('active', filterDiscs.has(disc));
  render();
}

function doSearch(val) {
  searchVal = val;
  render();
}

render();
</script>
